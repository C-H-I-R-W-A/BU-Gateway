name: 🐛 Bug Report
description: Report a bug or unexpected behaviour in BU Gateway
title: "[BUG] "
labels: ["bug", "needs-triage"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to fill out this bug report! Please be as detailed as possible.

  - type: textarea
    id: description
    attributes:
      label: 🐛 Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: "When I tap on the 'Student Portal' link, nothing happens..."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 🔁 Steps to Reproduce
      description: Steps to reproduce the behaviour
      placeholder: |
        1. Open the app
        2. Tap on '...'
        3. Scroll down to '...'
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: ✅ Expected Behaviour
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: ❌ Actual Behaviour
      description: What actually happened?
    validations:
      required: true

  - type: dropdown
    id: platform
    attributes:
      label: 📱 Platform
      description: Where did you encounter this bug?
      multiple: true
      options:
        - Android
        - iOS
        - Web (Chrome)
        - Web (Firefox)
        - Web (Safari)
    validations:
      required: true

  - type: input
    id: flutter-version
    attributes:
      label: 🦋 Flutter Version
      description: Run `flutter --version` and paste the result
      placeholder: "Flutter 3.x.x"

  - type: textarea
    id: screenshots
    attributes:
      label: 🖼️ Screenshots
      description: If applicable, add screenshots or a screen recording to help explain your problem.

  - type: textarea
    id: additional
    attributes:
      label: 📝 Additional Context
      description: Add any other context about the problem here.
