name: Flutter CI

on:
  push:
    branches: [ develop, it-support ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Analyze & Build
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🦋 Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.x'
          channel: 'stable'
          cache: true

      - name: 📦 Install dependencies
        run: flutter pub get

      - name: 🔍 Analyze code
        run: flutter analyze

      - name: 🧪 Run tests
        run: flutter test

      - name: 🌐 Build Web
        run: flutter build web --release

      - name: 🤖 Build Android APK
        run: flutter build apk --release --split-per-abi

      - name: 📤 Upload Web Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-build
          path: build/web/
          retention-days: 7

      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: build/app/outputs/flutter-apk/
          retention-days: 7
