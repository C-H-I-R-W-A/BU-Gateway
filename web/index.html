<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="bu_gateway">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>bu_gateway</title>
  <link rel="manifest" href="manifest.json">
</head>
<body>
  <!-- Visual loading spinner shown instantly while Flutter Web boots up -->
  <div id="loading-indicator">
    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background-color: #0D47A1; /* Official BU Blue */
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      }
      .loading-container {
        display: flex;
        flex-direction: column;
        align-items: center;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        border-top-color: #FFCC00; /* Official BU Gold */
        animation: spin 1s cubic-bezier(0.25, 1, 0.5, 1) infinite;
      }
      .loading-text {
        color: white;
        margin-top: 24px;
        font-size: 20px;
        font-weight: 600;
        letter-spacing: 0.8px;
      }
      .loading-subtitle {
        color: rgba(255, 255, 255, 0.7);
        margin-top: 8px;
        font-size: 13px;
        font-style: italic;
      }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
    </style>
    <div class="loading-container">
      <div class="spinner"></div>
      <div class="loading-text">BU Gateway</div>
      <div class="loading-subtitle">Excellence in Adventist Education</div>
    </div>
  </div>

  <script>
    // Remove the loading indicator once Flutter finishes rendering its first frame
    window.addEventListener('flutter-first-frame', function () {
      var loadingIndicator = document.getElementById('loading-indicator');
      if (loadingIndicator) {
        loadingIndicator.remove();
      }
    });
  </script>

  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
